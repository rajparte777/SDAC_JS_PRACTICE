<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuerrySelectorall</title>
</head>
<body>
      
    <p>Hello</p>
    <p>hello Js</p>
    <p>welcome</p>

    
<script>
    const paragrap = document.querySelectorAll('p')
    paragrap.forEach((p)=>{
            p.style.color="red"
    })
    
    console.log(paragrap);
</script>


</body>
</html>
